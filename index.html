    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .funnel-container { position: relative; width: 240px; height: 320px; }
        .funnel-top { 
            position: absolute; top: 0; left: 0; width: 100%; height: 130px; 
            background: rgba(30, 41, 59, 0.2); border: 1px solid rgba(255, 255, 255, 0.05);
            clip-path: polygon(0% 0%, 100% 0%, 65% 100%, 35% 100%);
        }
        .funnel-neck {
            position: absolute; top: 130px; left: 35%; width: 30%; height: 15px;
            background: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
            z-index: 30; transition: all 0.5s ease; border-radius: 2px;
        }
        .funnel-bottom {
            position: absolute; top: 145px; left: 35%; width: 30%; height: 120px;
            background: linear-gradient(to bottom, rgba(56, 189, 248, 0.3), transparent);
            filter: blur(8px); transition: width 0.5s ease, left 0.5s ease;
        }
        .particle {
            position: absolute; background: #38bdf8; border-radius: 50%;
            pointer-events: none; opacity: 0; width: 4px; height: 4px;
            z-index: 10;
        }
        @keyframes flowPass {
            0% { transform: translate(var(--startX), -20px); opacity: 0; }
            10% { opacity: 1; }
            45% { transform: translate(var(--midX), 130px); }
            50% { transform: translate(var(--midX), 140px) scale(0.7); }
            100% { transform: translate(var(--midX), 300px); opacity: 0; }
        }
        @keyframes flowBounce {
            0% { transform: translate(var(--startX), -20px); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translate(var(--midX), 130px); background: #38bdf8; }
            55% { transform: translate(var(--bounceX), 60px); background: var(--stateColor); }
            100% { transform: translate(var(--erraticX), -40px); opacity: 0; background: var(--stateColor); }
        }
        .gauge-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease; }
        .flag-btn { opacity: 0.4; transition: all 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; }
        .flag-btn.active { opacity: 1; background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; color: #38bdf8; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #1e293b; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb {
            height: 18px; width: 18px; border-radius: 50%; background: #38bdf8;
            cursor: pointer; -webkit-appearance: none; margin-top: -6px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>

            },
            es: {
                title: 'Panel de Neuroseguridad', subtitle: 'Auto-Simulación de Uso de IA', simTitle: 'Simular Interacción',

                preShort: 'Respuesta Corta', preInfo: 'Infografía', preDoc: 'Documento Compl.', preResearch: 'Investigación Prof.',
                lblHour: 'Hora del día', hourNote: 'Hora actual en su zona horaria.',
                theoryH: 'Teoría Cognitiva', theoryP: 'El cerebro posee un límite consciente (Tb) de ~60 bits/s. Auditar IA implica resolver el "Surprisal"—incertidumbre que excede este embudo. <a href="https://engineeringtrust.substack.com/p/the-architecture-of-cognitive-governance" target="_blank" class="text-sky-400 underline ml-1">Leer Parte 5</a>',

                encyclopediaH: 'Protocolos de Seguridad Estratégica (A-F)',
                protocolDetails: [
                    { id: 'A', name: 'Bloques de Recuperación', why: 'Reiniciar el freno vagal y limpiar residuos de glutamato.', how: 'Brecha analógica de 10m cada 50-90m. Coherencia respiratoria.' },
                    { id: 'B', name: 'Humano-al-Mando', why: 'Restaurar la agencia y reducir dolor social (Efecto Espejo).', how: 'Pasar de recepción pasiva a Colaboración Adversaria; intuición sobre datos.' },
                    { id: 'C', name: 'Movimiento Slow AI', why: 'Prevenir sesgo de automatización y errores por fatiga.', how: 'Regla de Síntesis Primero: redactar antes de la expansión IA.' },
                    { id: 'D', name: 'Calibración a Ciegas', why: 'Reactivar el DMN y prevenir la atrofia predictiva.', how: 'Auditorías mensuales sin ayuda de IA para tareas de alto impacto.' },
                    { id: 'E', name: 'Sandboxes de Despliegue', why: 'Mantener seguridad Ventral Vagal eliminando presión de rendimiento.', how: 'Zonas seguras para calibrar herramientas; valoración humana cualitativa.' },
                    { id: 'F', name: 'Primado Predictivo', why: 'Mantener afilado el músculo de auditoría crítica.', how: 'Sprints Analógicos de 15m sin IA al inicio y final del día.' }
                ],
                dayContent: [
                    { time: '09:00 AM', label: 'Protocolo F', title: 'Escudo Analógico', desc: 'Resolver sin IA durante 90m para proteger el DMN creativo.' },
                    { time: '10:30 AM', label: 'Protocolo B & C', title: 'Humano-al-Mando', desc: 'Síntesis primero. Definir estrategia antes del tsunami de información.' },
                    { time: '11:30 AM', label: 'Protocolo A', title: 'Reinicio 50/10', desc: 'Brecha analógica de 10m. Reiniciar variabilidad cardíaca.' },
                    { time: '02:00 PM', label: 'Protocolo E', title: 'Sandbox de Calibración', desc: 'Probar herramientas en puerto seguro sin amenaza de estatus.' },
                    { time: '04:00 PM', label: 'Protocolo C', title: 'Cap de Velocidad', desc: 'Reducir frecuencia cuando el glutamato sube. Prevenir errores.' },
                    { time: '05:30 PM', label: 'Protocolo F', title: 'Verificación', desc: 'Sprint final de 15m sin IA para probar inteligencia soberana.' }
                ],
                states: {
                    green: { title: "Estado Soberano", desc: "Alta integridad predictiva. El córtex prefrontal en homeostasis." },
                    amber: { title: "Estrangulamiento Metabólico", desc: "Aumento de glutamato. Sesgo de automatización detectado." },
                    red: { title: "Disolución Jacksoniana", desc: "Falla del freno vagal. Regresión a circuitos reactivos." },
                    critical: { title: "Externalización Cognitiva", desc: "Falla Humana Total. La máquina dirige el proceso." }
                },
                tags: { optimal: 'Óptimo', stressed: 'Estresado', overload: 'Sobrecarga', failure: 'Fallo', homeostasis: 'Homeostasis', accumulating: 'Acumulando', exhausted: 'Agotado', externalized: 'Externalizado' }
            }
        };

        let currentLang = 'en';
        const inputs = { tsf: document.getElementById('input-tsf'), tokens: document.getElementById('input-tokens'), hour: document.getElementById('input-hour') };
        function setTokens(val) { inputs.tokens.value = val; updateSimulation(); }
        function setLang(lang) { 
            currentLang = lang; 
            document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(`flag-${lang}`).classList.add('active'); 
            updateSimulation(); 
        }
        
        function spawnParticle(tsf, tokens, color, isBouncing) {
            const container = document.getElementById('data-particles-container');
            const num = Math.max(1, Math.floor(tokens / 400));
            for (let i = 0; i < num; i++) {
                const p = document.createElement('div');
                const speed = Math.max(0.6, 4 - (tsf / 25));
                p.className = 'particle';
                p.style.setProperty('--speed', speed + 's');
                p.style.setProperty('--startX', (Math.random() * 240) + 'px');
                p.style.setProperty('--midX', (84 + Math.random() * 72) + 'px');
                if (isBouncing) {
                    p.style.setProperty('--bounceX', (Math.random() < 0.5 ? -40 : 280) + 'px');
                    p.style.setProperty('--erraticX', (Math.random() * 340 - 50) + 'px');
                    p.style.setProperty('--stateColor', color);
                    p.style.animation = `flowBounce ${speed}s linear infinite`;
                } else { p.style.animation = `flowPass ${speed}s linear infinite`; }
                container.appendChild(p); setTimeout(() => p.remove(), speed * 1000);
            }
        }

        let particleTimer;
        function updateSimulation() {
            const t = translations[currentLang] || translations['en'];
            const tsf = parseInt(inputs.tsf.value);
            const tokens = parseInt(inputs.tokens.value);
            const hour = parseInt(inputs.hour.value);

            const load = Math.min(100, Math.round((tsf / 40) * 45 + (tokens / 3000) * 35 + (hour - 8) * 5));
            const effectiveLimit = Math.max(15, 60 * (1 - (load / 220))).toFixed(1);
            document.getElementById('dynamic-limit-val').innerText = effectiveLimit;

            // UI Refresh
            document.getElementById('txt-title').innerHTML = t.title + ` <span class="text-slate-500 font-light italic text-xl">v1.2.0</span>`;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('txt-theory-h').innerText = t.theoryH; 
            document.getElementById('txt-theory-p').innerHTML = t.theoryP;
            document.getElementById('txt-usage-h').innerText = t.usageH; 
            document.getElementById('txt-usage-p').innerText = t.usageP;
            document.getElementById('txt-disclaimer-h').innerText = t.disclaimerH; 
            document.getElementById('txt-disclaimer-p').innerText = t.disclaimerP;
            
            document.getElementById('lbl-tsf').innerHTML = `${t.lblTsf} <span class="float-right font-bold text-sky-400">${tsf} / hr</span>`;
            document.getElementById('lbl-complexity').innerHTML = `${t.lblComplexity} <span class="float-right font-bold text-sky-400">${tokens}</span>`;
            document.getElementById('lbl-hour').innerHTML = `${t.lblHour} <span class="float-right font-bold text-sky-400">${hour.toString().padStart(2, '0')}:00</span>`;
            document.getElementById('txt-hour-note').innerText = t.hourNote;
            document.getElementById('txt-sim-title').innerText = t.simTitle;

            // Buttons
            document.getElementById('btn-pre-short').innerText = t.preShort;
            document.getElementById('btn-pre-info').innerText = t.preInfo;
            document.getElementById('btn-pre-doc').innerText = t.preDoc;
            document.getElementById('btn-pre-research').innerText = t.preResearch;

            document.getElementById('txt-cln-lbl').innerText = t.clnLabel; 
            document.getElementById('txt-bits-lbl').innerText = t.bitsLabel;
            document.getElementById('txt-limit-lbl').innerText = t.limitLabel; 
            document.getElementById('lbl-gauge-tsf').innerText = t.gaugeTsf;
            document.getElementById('lbl-gauge-met').innerText = t.gaugeMet; 
            document.getElementById('txt-protocol-title').innerText = t.protocolTitle;
            document.getElementById('reset-btn').innerText = t.reset; 
            document.getElementById('txt-footer').innerText = t.footer;

            // Detail Block Rendering
            document.getElementById('txt-encyclopedia-h').innerText = t.encyclopediaH;
            const detailGrid = document.getElementById('encyclopedia-grid');
            detailGrid.innerHTML = t.protocolDetails.map(p => `
                <div class="space-y-3">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-sky-500/10 border border-sky-500/30 flex items-center justify-center font-black text-sky-400 text-xs">${p.id}</div>
                        <h3 class="font-bold text-sm text-slate-200 uppercase tracking-tight">${p.name}</h3>
                    </div>
                    <p class="text-[11px] text-slate-400 leading-relaxed"><span class="text-sky-500/70 font-bold uppercase">Why:</span> ${p.why}</p>
                    <p class="text-[11px] text-slate-300 leading-relaxed"><span class="text-emerald-500/70 font-bold uppercase">How:</span> ${p.how}</p>
                </div>
            `).join('');

            // Typical Day Rendering
            document.getElementById('txt-day-h').innerText = t.dayH;
            const dayRoadmap = document.getElementById('day-roadmap');
            dayRoadmap.innerHTML = t.dayContent.map(d => `
                <div class="p-5 rounded-2xl bg-white/5 border border-white/5 space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="text-sky-400 font-bold text-xs uppercase">${d.time}</span>
                        <span class="px-2 py-0.5 rounded-full bg-sky-500/10 text-sky-500 text-[9px] font-bold uppercase">${d.label}</span>
                    </div>
                    <h3 class="font-bold text-sm text-slate-200 uppercase tracking-tight">${d.title}</h3>
                    <p class="text-xs text-slate-400 leading-relaxed">${d.desc}</p>
                </div>
            `).join('');

            const cln = Math.round(3600 / tsf); document.getElementById('cln-val').innerText = `${cln}s`;
            const bps = ((tokens * 12) / cln).toFixed(1); document.getElementById('bits-val').innerText = bps;
            document.getElementById('output-stream').style.width = Math.max(5, 30 - ((hour - 8) * 1.6)) + '%';

            let stateKey = (tsf > 100 || (tsf > 60 && load > 92)) ? 'critical' : (tsf > 40 || load > 75) ? 'red' : (tsf > 25 || load > 50) ? 'amber' : 'green';
            const colors = { green: '#10b981', amber: '#f59e0b', red: '#ef4444', critical: '#a855f7' };
            const color = colors[stateKey];

            clearInterval(particleTimer);
            particleTimer = setInterval(() => spawnParticle(tsf, tokens, color, Math.random() < (stateKey === 'red' ? 0.75 : stateKey === 'amber' ? 0.35 : 0.05)), Math.max(100, 1000 / (tsf / 10)));
            updateRiskUI(stateKey, t, load, tsf, color);
        }

        function updateRiskUI(stateKey, t, load, tsf, color) {
            const state = t.states[stateKey];
            const banner = document.getElementById('risk-banner');
            banner.style.borderColor = color;
            document.getElementById('risk-title').innerText = state.title; 
            document.getElementById('risk-title').style.color = color;
            document.getElementById('risk-desc').innerText = state.desc;

            const badge = document.getElementById('status-badge');
            badge.innerText = t['status' + stateKey.charAt(0).toUpperCase() + stateKey.slice(1)];
            badge.style.color = color; badge.style.borderColor = color + '44'; badge.style.backgroundColor = color + '11';

            document.getElementById('tsf-bar').style.width = Math.min(100, (tsf / 80) * 100) + '%';
            document.getElementById('tsf-bar').style.backgroundColor = color;
            document.getElementById('tsf-percent').innerText = Math.round(Math.min(100, (tsf / 80) * 100)) + '%';
            document.getElementById('tsf-percent').style.color = color;

            document.getElementById('metabolic-bar').style.width = load + '%';
            document.getElementById('metabolic-bar').style.backgroundColor = color;
            document.getElementById('metabolic-percent').innerText = load + '%';
            document.getElementById('metabolic-percent').style.color = color;

            const tsfTag = document.getElementById('tsf-status'); 
            const metTag = document.getElementById('metabolic-status');
            tsfTag.style.color = color; tsfTag.style.backgroundColor = color + '22';
            metTag.style.color = color; metTag.style.backgroundColor = color + '22';
            tsfTag.innerText = t.tags[stateKey === 'green' ? 'optimal' : stateKey === 'amber' ? 'stressed' : stateKey === 'red' ? 'overload' : 'failure'];
            metTag.innerText = t.tags[stateKey === 'green' ? 'homeostasis' : stateKey === 'amber' ? 'accumulating' : stateKey === 'red' ? 'exhausted' : 'externalized'];

            const protocolMap = { green: 'F', amber: 'A', red: 'C', critical: 'B' };
            const pId = protocolMap[stateKey];
            const p = t.protocolDetails.find(item => item.id === pId);

            document.getElementById('protocol-panel').style.borderColor = color;
            document.getElementById('protocol-content').innerHTML = `
                <p class="font-black uppercase tracking-wider" style="color: ${color}">Protocol ${p.id}: ${p.name}</p>
                <div class="h-px bg-white/5 my-2"></div>
                <ul class="space-y-2">
                    <li class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full" style="background:${color}"></div>${p.how}</li>
                </ul>
            `;
            document.getElementById('funnel-neck').style.backgroundColor = color;
            document.getElementById('funnel-neck').style.boxShadow = `0 0 20px ${color}88`;
            document.getElementById('cln-val').style.color = color; 
            document.getElementById('bits-val').style.color = color;
            document.getElementById('dynamic-limit-val').style.color = color;
        }

        Object.values(inputs).forEach(input => input.addEventListener('input', updateSimulation));
        document.getElementById('reset-btn').addEventListener('click', () => { inputs.tsf.value = 15; inputs.tokens.value = 300; inputs.hour.value = 9; updateSimulation(); });
        setLang('en');
    </script>
