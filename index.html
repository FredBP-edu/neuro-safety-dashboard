        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .gauge-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease; }
        .flag-btn { opacity: 0.4; transition: all 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; }
        .flag-btn.active { opacity: 1; background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; color: #38bdf8; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #1e293b; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb {
            height: 18px; width: 18px; border-radius: 50%; background: #38bdf8;
            cursor: pointer; -webkit-appearance: none; margin-top: -6px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            transition: background 0.3s, box-shadow 0.3s;
        }
        
        /* Canvas Container */
        .funnel-wrapper { position: relative; width: 240px; height: 320px; margin: 0 auto; flex-shrink: 0; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

                this.x = 20 + Math.random() * 200; 
                this.y = -20;
                
                this.vy = 1 + (globalThroughput / 150) + Math.random() * 2;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.size = 1.5 + Math.random() * 2;
                this.bounced = false;
            }
            update() {
                let oldY = this.y;
                
                if (this.bounced) {
                    this.vy += 0.2;
                } else {
                    this.vy += 0.03;
                }

                this.y += this.vy;
                this.x += this.vx;

                if (this.y >= 0 && this.y < 130 && !this.bounced) {
                    const progress = this.y / 130;
                    const minX = progress * 84;
                    const maxX = 240 - (progress * 84);
                    
                    if (this.x < minX) {
                        this.x = minX;
                        this.vx = Math.abs(this.vx) * 0.4 + 0.5; 
                    } else if (this.x > maxX) {
                        this.x = maxX;
                        this.vx = -Math.abs(this.vx) * 0.4 - 0.5; 
                    }
                }

                if (oldY <= 130 && this.y > 130 && !this.bounced) {
                    if (currentStateKey !== 'critical' && Math.random() < currentBounceRate) { 
                        this.bounced = true;
                        this.vy = -(4 + Math.random() * 5); 
                        this.vx = (this.x < 120 ? -1 : 1) * (3 + Math.random() * 4);
                    }
                }

                if (this.y > 130 && !this.bounced) {
                    if (this.x < 85) { this.x = 85; this.vx = 0; }
                    if (this.x > 155) { this.x = 155; this.vx = 0; }
                    this.vx *= 0.8; 
                }

                if (this.y > canvas.height + 30 || this.x < -60 || this.x > canvas.width + 60) {
                    this.reset();
                }
            }
            draw() {
                let renderColor = '#38bdf8'; 
                
                if (currentStateKey === 'critical') {
                    renderColor = '#a855f7'; 
                } else if (this.bounced) {
                    renderColor = currentStateColor; 
                }

                ctx.fillStyle = renderColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = (this.bounced || currentStateKey === 'critical') ? 8 : 4;
                ctx.shadowColor = renderColor;
            }
        }

        for(let i=0; i<150; i++) particles.push(new Particle());

        function drawFunnelBackground() {
            ctx.fillStyle = "rgba(30, 41, 59, 0.5)";
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(240, 0);
            ctx.lineTo(156, 130);
            ctx.lineTo(84, 130);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = currentStateColor;
            ctx.shadowBlur = 15;
            ctx.shadowColor = currentStateColor;
            ctx.fillRect(84, 130, 72, 15);
            ctx.shadowBlur = 0;
            
            const grad = ctx.createLinearGradient(0, 145, 0, 320);
            const r = parseInt(currentStateColor.slice(1,3), 16);
            const g = parseInt(currentStateColor.slice(3,5), 16);
            const b = parseInt(currentStateColor.slice(5,7), 16);
            grad.addColorStop(0, `rgba(${r},${g},${b},0.3)`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.fillRect(84, 145, 72, 175);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFunnelBackground();
            
            const activeCount = Math.min(150, Math.max(30, Math.floor(inputs.tokens.value / 25)));
            
            for(let i=0; i<activeCount; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // --------------------------------------------------------
        // 4. INITIALIZATION
        // --------------------------------------------------------
        Object.values(inputs).forEach(input => input.addEventListener('input', updateSimulation));
        document.getElementById('reset-btn').addEventListener('click', () => { 
            inputs.tsf.value = 15; inputs.tokens.value = 300; inputs.entropy.value = 1.0; inputs.hour.value = 9; 
            updateSimulation(); 
        });
        
        setLang('en');
        animate();
    </script>
</body>
</html>
